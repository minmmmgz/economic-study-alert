name: Daily Economic Study Email

on:
  schedule:
    # KST 08:30 = UTC 전날 23:30
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-daily-email:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check email secret availability
        run: |
          python -c "import os; keys=['EMAIL_SENDER','EMAIL_PASSWORD','EMAIL_RECEIVER','SMTP_HOST','SMTP_PORT']; [print(f'{key} loaded: {bool(os.getenv(key))}') for key in keys]"

      - name: Send daily economic study email
        run: python main.py --max-news 5

      - name: Save indicator history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/economic_market_indicators_*.csv

          if git diff --cached --quiet; then
            echo "저장할 새로운 지표 파일이 없습니다."
          else
            git commit -m "Save daily market indicators"
            git push
          fi
